services:
  db:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    networks:
      - rw-network
    environment:
      POSTGRES_DB: ${DB_NAME:-rw-db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "8386:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-rw-db}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # AI model root: LayoutLMv3 files live in ai/model/layoutlmv3, while the
  # recommender_svm*.joblib files live directly in ai/model.
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
      args:
        AI_WITH_MODEL: ${AI_WITH_MODEL:-true}
    container_name: rw-ai
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rw-network
    environment:
      AI_WITH_MODEL: ${AI_WITH_MODEL:-true}
      # The model root is mounted at /app/model so both model families resolve.
      AI_MODEL_DIR: /app/model/layoutlmv3
      AI_MAX_PAGES: ${AI_MAX_PAGES:-3}
      AI_MAX_UPLOAD_BYTES: ${AI_MAX_UPLOAD_BYTES:-15728640}
      AI_OCR_LANGUAGES: ${AI_OCR_LANGUAGES:-eng+vie}
      AI_OCR_ENGINE: ${AI_OCR_ENGINE:-tesseract}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ${AI_MODEL_HOST_PATH:-./ai/model}:/app/model:ro
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Backend ──────────────────────────────────────────────────
  # Connects to the EXTERNAL postgres-db container already running on host port 8386.
  # host.docker.internal resolves to the host machine from inside Docker (Linux needs
  # extra_hosts: host.docker.internal:host-gateway for this to work).
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rw-backend
    restart: unless-stopped
    networks:
      - rw-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-rw-db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      # Hibernate creates the schema from the entities; spring.sql.init then runs
      # the ALTERs + seed (continue-on-error tolerates rows from older schema).
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_DATA_LOCATIONS: classpath:db/seed-postgres.sql
      SPRING_SQL_INIT_CONTINUE_ON_ERROR: "true"
      AI_CV_BASE_URL: http://ai:8001
      AI_CV_ENABLED: ${AI_CV_ENABLED:-true}
    ports:
      - "8000:8081"
    volumes:
      - cv_uploads:/app/uploads
    depends_on:
      ai:
        condition: service_healthy
      db:
        condition: service_healthy

  # ── React / Vite Frontend ────────────────────────────────────────────────
  # localhost:3000 (your machine) → :3001 (inside container, nginx)
  # VITE_API_BASE_URL is baked at build time — must be the HOST port (8000)
  # because it's the browser that calls the backend, not the container.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: rw-frontend
    restart: unless-stopped
    networks:
      - rw-network
    ports:
      - "3000:3001"
    depends_on:
      - backend

# ── Shared Bridge Network ────────────────────────────────────────────────────
# All services join "rw-network" so they can reach each other
# by container/service name instead of IP.
networks:
  rw-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  cv_uploads:
    driver: local
