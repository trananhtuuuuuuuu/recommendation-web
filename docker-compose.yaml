  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  # ── Spring Boot Backend ──────────────────────────────────────────────────
  # Connects to the EXTERNAL postgres-db container already running on host port 8386.
  # host.docker.internal resolves to the host machine from inside Docker (Linux needs
  # extra_hosts: host.docker.internal:host-gateway for this to work).
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rw-backend
    restart: unless-stopped
    networks:
      - rw-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:8386/${DB_NAME:-rw-db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    ports:
      - "8000:8081"

  # ── React / Vite Frontend ────────────────────────────────────────────────
  # localhost:3000 (your machine) → :3001 (inside container, nginx)
  # VITE_API_BASE_URL is baked at build time — must be the HOST port (8000)
  # because it's the browser that calls the backend, not the container.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: rw-frontend
    restart: unless-stopped
    networks:
      - rw-network
    ports:
      - "3000:3001"
    depends_on:
      - backend

# ── Shared Bridge Network ────────────────────────────────────────────────────
# All three services join "rw-network" so they can reach each other
# by container/service name (e.g. "db", "backend", "frontend") instead of IP.
networks:
  rw-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
