spring:
  application:
    name: backend
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql
  datasource:
    url: jdbc:postgresql://localhost:8386/rw-db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  main:
    banner-mode: off

logging:
  level:
    root: WARN
server:
  port: 8000

app:
  ai:
    enabled: ${AI_CV_ENABLED:true}
    base-url: ${AI_CV_BASE_URL:http://localhost:8001}

privacy:
  differential:
    enabled: true
    applicant-count:
      epsilon: ${DP_APPLICANT_COUNT_EPSILON:0.5}
      release-window: ${DP_APPLICANT_COUNT_RELEASE_WINDOW:P7D}
      release-secret: ${DP_RELEASE_SECRET:local-development-dp-release-secret-change-me}
  anonymous-candidate-preview:
    enabled: true
    minimum-eligible-candidates: ${ANON_PREVIEW_MINIMUM_ELIGIBLE_CANDIDATES:10}
    maximum-previews: ${ANON_PREVIEW_MAXIMUM_PREVIEWS:3}
    rotation-window: ${ANON_PREVIEW_ROTATION_WINDOW:P7D}
    rate-limit-per-window: ${ANON_PREVIEW_RATE_LIMIT_PER_WINDOW:20}
    token-secret: ${ANON_PREVIEW_TOKEN_SECRET:${DP_RELEASE_SECRET:local-development-anonymous-preview-secret-change-me}}
