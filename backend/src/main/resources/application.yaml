spring:
  application:
    name: backend
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql
  datasource:
    url: jdbc:postgresql://localhost:8386/rw-db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  main:
    banner-mode: off

logging:
  level:
    root: WARN
server:
  port: 8000

app:
  ai:
    enabled: ${AI_CV_ENABLED:true}
    base-url: ${AI_CV_BASE_URL:http://localhost:8001}
