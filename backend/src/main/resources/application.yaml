spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:8386/rw-db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  main:
    banner-mode: off

logging:
  level:
    root: WARN
server:
  port: 8000 