spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

privacy:
  differential:
    enabled: true
    applicant-count:
      epsilon: 0.5
      release-window: P7D
      release-secret: test-dp-release-secret
  anonymous-candidate-preview:
    enabled: true
    minimum-eligible-candidates: 3
    maximum-previews: 2
    rotation-window: P7D
    rate-limit-per-window: 3
    token-secret: test-anonymous-preview-secret
